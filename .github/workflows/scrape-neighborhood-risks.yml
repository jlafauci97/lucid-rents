name: Scrape Neighborhood Risks sources

on:
  schedule:
    # Weekly, Sundays at 06:00 UTC (02:00 ET) — runs before the Vercel cron
    # at 07:00 UTC so scraped POIs are written before the Socrata syncs
    # tally the row counts.
    - cron: "0 6 * * 0"
  workflow_dispatch:
    inputs:
      source:
        description: "Which scraper to run (or 'all')"
        required: false
        default: "all"
        type: choice
        options:
          - all
          - coalition-homeless
          - faithbased-shelters
          - oasas-methadone
          - herrc-migrant-centers
          - nypd-precincts
          - bop-halfway-houses
          - nys-brownfields
      dry_run:
        description: "Dry-run (no DB writes)"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        scraper:
          - coalition-homeless
          - faithbased-shelters
          - oasas-methadone
          - herrc-migrant-centers
          - nypd-precincts
          - bop-halfway-houses
          - nys-brownfields
    name: "${{ matrix.scraper }}"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Skip if manual run targets a different scraper
        if: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.source != 'all' && github.event.inputs.source != matrix.scraper }}
        run: |
          echo "Skipping ${{ matrix.scraper }} — manual run scoped to ${{ github.event.inputs.source }}"
          exit 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: |
          pip install "scrapling[all]" supabase requests
          playwright install --with-deps chromium
          patchright install chromium
          scrapling install

      - name: Run scraper
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          DRY_RUN_FLAG=""
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            DRY_RUN_FLAG="--dry-run"
          fi
          python3 scripts/scrape-${{ matrix.scraper }}.py $DRY_RUN_FLAG
