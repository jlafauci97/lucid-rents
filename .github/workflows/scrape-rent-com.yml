name: Scrape Rent.com

on:
  schedule:
    # Run daily at 6:00 AM EST (11:00 UTC) — after the Vercel syncs finish
    - cron: "0 11 * * *"
  workflow_dispatch:
    inputs:
      pages:
        description: "Pages per borough to scrape"
        required: false
        default: "3"
      borough:
        description: "Single borough (leave empty for all)"
        required: false
        default: ""

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: |
          pip install scrapling supabase
          scrapling install

      - name: Run scraper
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          PAGES="${{ github.event.inputs.pages || '3' }}"
          BOROUGH="${{ github.event.inputs.borough || '' }}"

          ARGS="--pages=$PAGES"
          if [ -n "$BOROUGH" ]; then
            ARGS="$ARGS --borough=$BOROUGH"
          fi

          python scripts/scrape-rent-com.py $ARGS
