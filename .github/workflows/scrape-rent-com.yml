name: Scrape Rental Listings

on:
  schedule:
    # Run daily at 6:00 AM EST (11:00 UTC) — after the Vercel syncs finish
    # Each source staggers 15 min apart to avoid overwhelming Supabase
    - cron: "0 11 * * *"
  workflow_dispatch:
    inputs:
      pages:
        description: "Pages per borough to scrape"
        required: false
        default: "3"
      borough:
        description: "Single borough (leave empty for all)"
        required: false
        default: ""
      source:
        description: "Source to scrape (all, rent_com, zillow, apartments_com, streeteasy)"
        required: false
        default: "all"

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: |
          pip install scrapling supabase playwright curl_cffi patchright
          playwright install --with-deps chromium
          patchright install chromium
          scrapling install

      - name: Scrape Rent.com
        if: ${{ github.event.inputs.source == 'all' || github.event.inputs.source == 'rent_com' || github.event_name == 'schedule' }}
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          PAGES="${{ github.event.inputs.pages || '3' }}"
          BOROUGH="${{ github.event.inputs.borough || '' }}"
          ARGS="--pages=$PAGES"
          if [ -n "$BOROUGH" ]; then ARGS="$ARGS --borough=$BOROUGH"; fi
          python scripts/scrape-rent-com.py $ARGS

      - name: Scrape Zillow
        if: ${{ github.event.inputs.source == 'all' || github.event.inputs.source == 'zillow' || github.event_name == 'schedule' }}
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          PAGES="${{ github.event.inputs.pages || '3' }}"
          BOROUGH="${{ github.event.inputs.borough || '' }}"
          ARGS="--pages=$PAGES"
          if [ -n "$BOROUGH" ]; then ARGS="$ARGS --borough=$BOROUGH"; fi
          python scripts/scrape-zillow.py $ARGS

      - name: Scrape Apartments.com
        if: ${{ github.event.inputs.source == 'all' || github.event.inputs.source == 'apartments_com' || github.event_name == 'schedule' }}
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          PAGES="${{ github.event.inputs.pages || '3' }}"
          BOROUGH="${{ github.event.inputs.borough || '' }}"
          ARGS="--pages=$PAGES"
          if [ -n "$BOROUGH" ]; then ARGS="$ARGS --borough=$BOROUGH"; fi
          python scripts/scrape-apartments-com.py $ARGS

      - name: Scrape StreetEasy
        if: ${{ github.event.inputs.source == 'all' || github.event.inputs.source == 'streeteasy' || github.event_name == 'schedule' }}
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          PAGES="${{ github.event.inputs.pages || '3' }}"
          BOROUGH="${{ github.event.inputs.borough || '' }}"
          ARGS="--pages=$PAGES"
          if [ -n "$BOROUGH" ]; then ARGS="$ARGS --borough=$BOROUGH"; fi
          python scripts/scrape-streeteasy.py $ARGS
