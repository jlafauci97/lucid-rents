name: Scrape Rental Listings

on:
  schedule:
    # Run daily at 6:00 AM EST (11:00 UTC)
    - cron: "0 11 * * *"
  workflow_dispatch:
    inputs:
      pages:
        description: "Pages per borough to scrape"
        required: false
        default: "3"
      source:
        description: "Source to scrape (all, rent_com, zillow, streeteasy, zumper, compass)"
        required: false
        default: "all"

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 180
    strategy:
      fail-fast: false
      matrix:
        borough: [Manhattan, Brooklyn, Queens, Bronx, "Staten Island"]
    name: "${{ matrix.borough }}"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: |
          pip install "scrapling[all]" supabase playwright
          playwright install --with-deps chromium
          patchright install chromium
          scrapling install

      - name: Scrape Rent.com
        if: ${{ github.event.inputs.source == 'all' || github.event.inputs.source == 'rent_com' || github.event_name == 'schedule' }}
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          PAGES="${{ github.event.inputs.pages || '3' }}"
          python scripts/scrape-rent-com.py --pages=$PAGES --borough="${{ matrix.borough }}"

      - name: Scrape Zillow
        if: ${{ github.event.inputs.source == 'all' || github.event.inputs.source == 'zillow' || github.event_name == 'schedule' }}
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          PAGES="${{ github.event.inputs.pages || '3' }}"
          python scripts/scrape-zillow.py --pages=$PAGES --borough="${{ matrix.borough }}"

      - name: Scrape StreetEasy
        if: ${{ github.event.inputs.source == 'all' || github.event.inputs.source == 'streeteasy' || github.event_name == 'schedule' }}
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          PAGES="${{ github.event.inputs.pages || '25' }}"
          python scripts/scrape-streeteasy.py --pages=$PAGES --borough="${{ matrix.borough }}"

      - name: Scrape Zumper
        if: ${{ github.event.inputs.source == 'all' || github.event.inputs.source == 'zumper' || github.event_name == 'schedule' }}
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          PAGES="${{ github.event.inputs.pages || '5' }}"
          python scripts/scrape-zumper.py --pages=$PAGES --borough="${{ matrix.borough }}"

      - name: Scrape Compass
        if: ${{ github.event.inputs.source == 'all' || github.event.inputs.source == 'compass' || github.event_name == 'schedule' }}
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          PAGES="${{ github.event.inputs.pages || '5' }}"
          python scripts/scrape-compass.py --pages=$PAGES --borough="${{ matrix.borough }}"
